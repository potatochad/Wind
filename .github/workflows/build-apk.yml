name: Build APK

on: push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # force Node 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3.1.0  # latest patch version

      - name: Set up JDK 17
        uses: actions/setup-java@v3.13.0  # latest patch supporting Node 24
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v3.3.1  # latest patch
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Wait 1 second
        run: sleep 1

      - name: Build APK
        run: |
          source ./app/src/main/java/com/productivity/wind/Imports/Utils/Ignore_Imports.sh
          give_gradle_permission
          Build_APK

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.1.1  # latest patch
        with:
          name: app-release-${{ github.run_number }}.apk
          path: app/build/outputs/apk/release/app-release.apk
